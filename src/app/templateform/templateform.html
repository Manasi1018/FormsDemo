<form #signupform="ngForm" (ngSubmit)="onSubmit(signupform)">
<label>Name:</label>
<input type = "text" name="name"  ngModel minlength="2" required  #name="ngModel"   pattern="^[A-Za-z]+$">
<div class="error" *ngIf="name.invalid && name.touched">
    <small *ngIf="name.errors?.['required']">Name is required</small>
    <small *ngIf="name.errors?.['minlength']">Minimum Length is 2 char</small>
    <small *ngIf="name.errors?.['pattern']">Only Alphabets</small>
</div>



<br><br>
<label>Email</label>
<input type="email" ngModel name="email">

<br><br>

<label>Age</label>
<input type="text" name="age" ngModel>

<br><br>
<label>Address: </label>
<input type="text" name="addresss" [(ngModel)]="useradd.road" required>
<p>U typed: {{useradd.road}}</p>


<br><br>

<label>Gender</label>
<input type="radio" name="gender" value="Male"  ngModel>Male
<input type="radio" name="gender" value="female" ngModel>Female

<br><br>

<button type="submit">Submit</button>
<br>
<button type="reset">Reset </button>
</form>

<pre>{{signupform.value|json}}</pre>
